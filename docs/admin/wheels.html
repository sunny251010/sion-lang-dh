<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý vòng quay - Sion Lang DH</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body data-page="admin" data-path-base="..">
  <header class="site-header">
    <div class="header-top"><div class="nav-inner"><a class="brand" href="../home.html"><span class="brand-mark">S</span><span>Sion Lang DH</span></a><span class="header-label">Quản trị</span><button class="nav-toggle" type="button" aria-label="Mở menu" aria-expanded="false" data-nav-toggle><span class="nav-toggle-lines"></span></button></div></div>
    <nav class="nav-bar" aria-label="Điều hướng chính"><div class="nav-inner"><div class="nav-links" data-nav-links><a class="nav-link" href="../home.html" data-nav-page="home">Trang chủ</a><a class="nav-link" href="../tab-generator.html" data-nav-page="tab-generator">Trình tạo tab</a><a class="nav-link" href="../lucky-wheel.html" data-nav-page="lucky-wheel">Bốc thăm Giáo huấn</a><a class="nav-link" href="./index.html" data-nav-page="admin" data-admin-link>Quản trị</a></div><div class="nav-meta"><span class="nav-user" data-user-name></span><button class="nav-logout" type="button" data-logout>Đăng xuất</button></div></div></nav>
  </header>
  <main class="page">
    <section class="page-banner"><p class="eyebrow">Admin</p><h1>Quản lý vòng quay</h1><p class="lead">Tạo và cập nhật danh sách người tham gia cho từng vòng quay.</p></section>
    <p class="status" id="wheelsStatus"></p>
    <section class="admin-layout">
      <form class="panel wheel-editor" id="wheelForm">
        <h2 id="wheelFormTitle">Tạo vòng quay mới</h2>
        <input type="hidden" id="wheelId">
        <div class="field"><label for="wheelTitle">Tiêu đề</label><input id="wheelTitle" required></div>
        <div class="field"><label for="wheelParticipants">Người tham gia, mỗi dòng một tên</label><textarea id="wheelParticipants" required></textarea></div>
        <label><input id="wheelActive" type="checkbox" checked> Active</label>
        <div class="button-row"><button class="button" type="submit">Lưu vòng quay</button><button class="button secondary" type="button" id="newWheelButton">Tạo mới</button></div>
      </form>
      <div class="wheel-list" id="wheelList"></div>
    </section>
  </main>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/route-guard.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/admin/wheels.js"></script>
</body>
</html>
